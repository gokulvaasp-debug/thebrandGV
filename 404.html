<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | thebrandGV</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--dark:#0a0e1a;--purple:#7c5cfc;--cyan:#4fd1e8;--white:#fff;--muted:#6b7280;}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
.logo{margin-bottom:48px;opacity:0;animation:fadeUp 0.8s ease 0.1s forwards;}
.logo img{height:56px;width:auto;}
.code{font-family:'Space Grotesk',sans-serif;font-size:clamp(80px,18vw,160px);font-weight:800;letter-spacing:-6px;line-height:1;background:linear-gradient(135deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;animation:fadeUp 0.8s ease 0.2s forwards;}
.title{font-family:'Space Grotesk',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:700;color:var(--white);margin:20px 0 12px;opacity:0;animation:fadeUp 0.8s ease 0.35s forwards;}
.sub{font-size:16px;color:rgba(255,255,255,0.45);max-width:420px;line-height:1.7;margin-bottom:40px;opacity:0;animation:fadeUp 0.8s ease 0.45s forwards;}
.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--purple),var(--cyan));color:var(--white);text-decoration:none;border-radius:100px;padding:16px 36px;font-size:15px;font-weight:700;letter-spacing:0.02em;transition:opacity 0.2s;opacity:0;animation:fadeUp 0.8s ease 0.55s forwards;}
.btn:hover{opacity:0.88;}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,0.4);text-decoration:none;font-size:14px;font-weight:500;margin-top:16px;transition:color 0.2s;opacity:0;animation:fadeUp 0.8s ease 0.65s forwards;}
.btn-ghost:hover{color:var(--white);}
.actions{display:flex;flex-direction:column;align-items:center;gap:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
  <div class="logo">
    <img src="logo-main-light.png" alt="thebrandGV">
  </div>
  <div class="code">404</div>
  <h1 class="title">Page not decoded.</h1>
  <p class="sub">This page doesn't exist — or it moved. Let's get you back to something that does.</p>
  <div class="actions">
    <a href="index.html" class="btn">← Back to Home</a>
    <a href="blog.html" class="btn-ghost">Or read Thoughts & Decoded Logics →</a>
  </div>
</body>
</html>
